name: Build Aseprite
on:
  push:
    branches: [main]  # 仅在 main 分支推送时触发
  workflow_dispatch:  # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive  # 必须包含子模块

      - name: Install Skia (Windows)
        shell: bash
        run: |
          wget https://github.com/aseprite/skia/releases/latest/download/Skia-Windows-Release-x64.zip
          unzip Skia-Windows-Release-x64.zip -d skia

      - name: Setup MSVC Compiler
        uses: ilammy/msvc-dev-cmd@v1  # 配置 MSVC 编译器

      - name: Generate Build Files
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DLAF_BACKEND=skia \
            -DSKIA_DIR=skia \
            -DSKIA_LIBRARY_DIR=skia/out/Release-x64

      - name: Compile Aseprite
        shell: bash
        run: cd build && ninja  # 使用 Ninja 编译

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: asepprite-windows
          path: |
            build/bin/aseprite.exe
            build/bin/data
