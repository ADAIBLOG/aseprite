name: build

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [RelWithDebInfo, Debug]
        ui: [gui, cli]
        scripting: [lua, noscripts]
        exclude:
          - build_type: Debug
            ui: gui
          - build_type: RelWithDebInfo
            ui: cli
          - build_type: RelWithDebInfo
            scripting: noscripts

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Install Dependencies
      run: |
        choco install -y vswhere
        choco install -y ninja
        choco install -y cmake
        choco install -y git
        choco install -y python
        choco install -y 7zip

    - name: Install Skia
      if: ${{ matrix.ui == 'gui' }}
      run: |
        Invoke-WebRequest -Uri https://github.com/aseprite/skia/releases/download/m102-861e4743af/Skia-Windows-Release-x64.zip -OutFile Skia-Windows-Release-x64.zip
        7z x Skia-Windows-Release-x64.zip -oskia

    - name: Setup MSVC
      shell: powershell
      run: |
        $vswhere_path = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
        & "$vswhere_path\VC\Auxiliary\Build\vcvars64.bat"

    - name: Generating Makefiles
      shell: powershell
      run: |
        if (${{ matrix.ui }} -eq 'gui') {
          $laf_backend = 'skia'
        } else {
          $laf_backend = 'none'
        }

        if (${{ matrix.scripting }} -eq 'lua') {
          $enable_scripting = 'on'
        } else {
          $enable_scripting = 'off'
        }

        cmake -S . -B build -G Ninja `
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
          -DENABLE_TESTS=OFF `
          -DENABLE_SCRIPTING=$enable_scripting `
          -DLAF_BACKEND=$laf_backend `
          -DSKIA_DIR=skia `
          -DSKIA_LIBRARY_DIR=skia/out/Release-x64

    - name: Compiling
      run: |
        cmake --build build --config ${{ matrix.build_type }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aseprite-windows-build
        path: build/bin/*.exe
