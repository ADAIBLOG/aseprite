name: Build Aseprite (Windows)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest  # 使用 Windows 环境

    steps:
    - name: 检出仓库及子模块
      uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: 安装依赖项
      run: |
        # 通过 Chocolatey 安装基础工具
        choco install -y cmake --installargs 'ADD_CMAKE_TO_PATH=System'
        choco install -y ninja
        choco install -y 7zip

        # 安装 Visual Studio 构建工具 (C++ 桌面开发)
        echo "安装 MSVC 构建工具..."
        Invoke-WebRequest -Uri https://aka.ms/vs/16/release/vs_buildtools.exe -OutFile vs_buildtools.exe
        Start-Process -Wait -FilePath .\vs_buildtools.exe -ArgumentList `
          '--add Microsoft.VisualStudio.Workload.VCTools --add Microsoft.VisualStudio.Component.Windows10SDK --quiet'

    - name: 下载 Skia (Windows 版本)
      run: |
        mkdir -Force deps/skia | Out-Null
        Invoke-WebRequest -Uri "https://github.com/aseprite/skia/releases/download/m102-861e4743af/Skia-Windows-Release-x64.zip" -OutFile skia.zip
        7z x skia.zip -o"deps/skia" -y

    - name: 生成构建目录
      run: mkdir build

    - name: 配置 CMake
      working-directory: ./build
      run: |
        cmake -G "Ninja" `
          -DCMAKE_BUILD_TYPE=Release `
          -DLAF_BACKEND=skia `
          -DSKIA_DIR=$Env:GITHUB_WORKSPACE/deps/skia `
          ..

    - name: 编译 Aseprite
      working-directory: ./build
      run: ninja aseprite

    - name: 收集 DLL 依赖
      run: |
        # 复制 Skia 的 DLL 到输出目录
        Copy-Item -Path "deps/skia/icudtl.dat" -Destination "build/bin"
        Copy-Item -Path "deps/skia/*.dll" -Destination "build/bin"

    - name: 上传制品
      uses: actions/upload-artifact@v3
      with:
        name: aseprite-windows
        path: build/bin/aseprite.exe
