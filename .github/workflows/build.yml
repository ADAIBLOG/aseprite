name: build-windows-x64
on: [push, pull_request]
jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release]
        enable_ui: [on]
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    # 安装必要工具
    - name: Install 7-Zip
      shell: powershell
      run: choco install 7zip -y --no-progress

    # 下载预编译依赖
    - name: Download Skia & Dependencies
      shell: bash
      run: |
        curl -L -o skia.zip https://github.com/blueloveTH/aseprite/releases/download/v0.01/skia.zip
        curl -L -o libcrypto-1_1-x64.dll https://github.com/blueloveTH/aseprite/releases/download/v0.01/libcrypto-1_1-x64.dll
        7z x skia.zip -o./skia

    # 配置构建环境
    - uses: seanmiddleditch/gha-setup-ninja@master
    - uses: ilammy/msvc-dev-cmd@v1

    # 生成构建文件
    - name: Configure CMake
      shell: bash
      run: |
        cmake -S . -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DENABLE_UI=${{ matrix.enable_ui }} \
          -DENABLE_CCACHE=OFF \
          -DLAF_BACKEND=skia \
          -DSKIA_DIR=./skia \
          -DSKIA_LIBRARY_DIR=./skia/out/Release-x64 \
          -DSKIA_LIBRARY=./skia/out/Release-x64/skia.lib

    # 编译项目
    - name: Compile
      shell: bash
      run: cd build && ninja

    # 整理产物
    - name: Prepare Artifacts
      shell: bash
      run: |
        mkdir -p dist
        cp libcrypto-1_1-x64.dll build/bin/aseprite.exe dist/
        cp -r build/bin/data dist/

    # 上传成品
    - uses: actions/upload-artifact@v3
      with:
        name: aseprite-windows-x64
        path: dist/*
