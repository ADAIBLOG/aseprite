name: build
on: [push, pull_request]
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        build_type: [Release]
        enable_ui: [on]
        include:
          - os: windows-latest
            build_type: Release
            enable_ui: on
    steps:
    - uses: actions/checkout@v3
      with:
        submodules: 'recursive'
    - name: Install 7zip
      run: choco install 7zip -y
    - uses: seanmiddleditch/gha-setup-ninja@master
    - uses: ilammy/msvc-dev-cmd@v1
      if: runner.os == 'Windows'
    - name: Generating Makefiles
      shell: bash
      run: |
        export enable_ccache=off
        curl -L https://github.com/aseprite/skia/releases/download/m102-861e4743af/Skia-Windows-Release-x64.zip --output skia.zip
        curl -L https://slproweb.com/download/Win64OpenSSL-1_1_1w.exe --output openssl.exe
        7z x openssl.exe -oopenssl_extracted libcrypto-1_1-x64.dll
        mv openssl_extracted/libcrypto-1_1-x64.dll .
        7z x skia.zip
        cmake -S . -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DENABLE_UI=${{ matrix.enable_ui }} \
          -DENABLE_CCACHE=$enable_ccache \
          -DLAF_BACKEND=skia \
          -DSKIA_DIR=./skia \
          -DSKIA_LIBRARY_DIR=./skia/out/Release-x64 \
          -DSKIA_LIBRARY=./skia/out/Release-x64/skia.lib
    - name: Compiling
      shell: bash
      run: |
        cd build && ninja
    - uses: actions/upload-artifact@v4
      with:
        name: aseprite
        path: |
          libcrypto-1_1-x64.dll
          build/bin/data
          build/bin/aseprite.exe

  verify:
    needs: build
    runs-on: windows-latest
    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        name: aseprite
        path: downloaded_artifacts
    - name: List Downloaded Files
      shell: bash
      run: |
        ls -R downloaded_artifacts
